<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFW Gallery | 常规画廊</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; 
            padding: 40px 20px; 
        }
        .gallery-item {
            background: #222;
            padding: 10px;
            border: 1px solid #333;
            transition: 0.3s;
        }
        .gallery-item:hover {
            border-color: #00ffcc;
            transform: translateY(-5px);
        }
        .gallery-item img { 
            width: 100%; 
            height: auto; 
            display: block;
        }
        .info {
            margin-top: 10px;
            font-size: 0.9em;
        }
        .date { color: #888; font-size: 0.8em; }
    </style>
</head>
<body>

    <nav style="padding: 20px; background: #111; position: sticky; top: 0; z-index: 100;">
        <a href="gallery.html" style="color: #00ffcc; text-decoration: none;">← Back / 返回</a>
        <span style="margin-left: 20px;" class="zh">常规作品展示</span>
        <span style="margin-left: 20px;" class="en">General Portfolio</span>
    </nav>

    <div id="sfw-grid" class="grid-container">
        </div>

    <script src="gallery-data.js"></script>
    <script>
        function renderSFW() {
            const grid = document.getElementById('sfw-grid');
            
            // 使用 .reverse() 可以让最新添加的画出现在最上面
            sfwImages.slice().reverse().forEach(img => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.innerHTML = `
                    <img src="${img.url}" alt="${img.title}" loading="lazy">
                    <div class="info">
                        <strong>${img.title}</strong><br>
                        <span class="date">${img.date}</span>
                    </div>
                `;
                grid.appendChild(item);
            });
        }

        // 页面加载后立即渲染
        window.onload = renderSFW;
    </script>
</body>
</html>
