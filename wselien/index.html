<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wseilen's website | 夜兔莎白的小站</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="lang-switch">
            <button onclick="setLang('zh')">中文</button> | 
            <button onclick="setLang('en')">EN</button>
        </div>

        <div class="avatar-container">
            <img src="icon.png" alt="Icon" class="main-icon">
        </div>

        <div class="nav-menu">
            <a href="gallery.html" class="btn">
                <span class="zh">画廊</span><span class="en">Gallery</span>
            </a>
            <a href="about.html" class="btn">
                <span class="zh">关于</span><span class="en">About</span>
            </a>
            <a href="https://linktr.ee/cadwr_carvey" target="_blank" class="btn">
                <span class="zh">外链</span><span class="en">Linktree</span>
            </a>
        </div>
    </div>

    <script>
        function setLang(lang) {
            document.documentElement.lang = lang;
            const zhElements = document.querySelectorAll('.zh');
            const enElements = document.querySelectorAll('.en');
            if (lang === 'zh') {
                zhElements.forEach(el => el.style.display = 'inline-block');
                enElements.forEach(el => el.style.display = 'none');
            } else {
                zhElements.forEach(el => el.style.display = 'none');
                enElements.forEach(el => el.style.display = 'inline-block');
            }
        }
        // 默认显示中文
        setLang('zh');
    </script>
</body>
</html>
