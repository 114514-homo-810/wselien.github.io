<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSFW Gallery | 限制级画廊</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 这里的样式专门用于年龄遮罩 */
        #age-gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            text-align: center; padding: 20px;
        }
        .warning-box { border: 2px solid #ff4d4d; padding: 30px; max-width: 400px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; padding: 20px; }
        .gallery-item img { width: 100%; height: auto; border: 1px solid #333; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="age-gate">
        <div class="warning-box">
            <h1 style="color: #ff4d4d;">[ WARNING ]</h1>
            <p class="zh">本页面包含成人内容或恋物内容，仅限18岁以上人士访问。</p>
            <p class="en">This page contains NSFW or Fetish content. Restricted to ages 18+.</p>
            <br>
            <button onclick="enterGallery()" class="btn" style="border-color:#ff4d4d;">ENTER / 进入</button>
            <a href="index.html" class="btn">LEAVE / 离开</a>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <nav style="padding: 20px;">
            <a href="gallery.html" style="color: #00ffcc;">← Back to Selection</a>
        </nav>
        
        <div id="nsfw-grid" class="grid-container">
            </div>
    </div>

    <script src="gallery-data.js"></script>
    <script>
        // 年龄确认逻辑
        function enterGallery() {
            document.getElementById('age-gate').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            renderGallery();
        }

        // 自动渲染画廊
        function renderGallery() {
            const grid = document.getElementById('nsfw-grid');
            // 假设 gallery-data.js 中定义了 nsfwImages 数组
            nsfwImages.forEach(img => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.innerHTML = `
                    <img src="${img.url}" alt="${img.title}" loading="lazy">
                    <p style="font-size: 0.8em; margin-top: 5px;">${img.title} <span style="color:#666;">| ${img.date}</span></p>
                `;
                grid.appendChild(item);
            });
        }
    </script>
</body>
</html>
